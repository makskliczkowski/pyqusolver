# Read the Docs configuration for the standalone pyqusolver repository.
# The installable Python package lives under Python/.

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

python:
  install:
    - method: pip
      path: Python
      extra_requirements:
        - docs
        - hdf5

sphinx:
  configuration: Python/docs/conf.py
  fail_on_warning: false
